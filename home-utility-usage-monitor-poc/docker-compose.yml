services:
  kafka:
    image: redpandadata/redpanda:v24.3.6
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - 512M
      - --reserve-memory
      - 0M
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://127.0.0.1:9092
    ports:
      - "9092:9092"
      - "9644:9644"

  timescale:
    image: timescale/timescaledb:2.17.2-pg16
    environment:
      POSTGRES_DB: utility_monitor
      POSTGRES_USER: utility
      POSTGRES_PASSWORD: utility
    ports:
      - "5435:5432"
    volumes:
      - utility-timescale-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6382:6379"

volumes:
  utility-timescale-data:
