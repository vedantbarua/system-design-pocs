services:
  kafka:
    image: redpandadata/redpanda:v24.3.6
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - 512M
      - --reserve-memory
      - 0M
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://127.0.0.1:9097
    ports:
      - "9097:9092"
      - "9649:9644"

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: chore_coordinator
      POSTGRES_USER: chores
      POSTGRES_PASSWORD: chores
    ports:
      - "5440:5432"
    volumes:
      - chore-postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6387:6379"

volumes:
  chore-postgres-data:
