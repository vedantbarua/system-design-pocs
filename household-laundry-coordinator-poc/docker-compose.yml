services:
  kafka:
    image: redpandadata/redpanda:v24.1.7
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - 512M
      - --reserve-memory
      - 0M
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://kafka:9092
    ports:
      - "9105:9092"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: laundry
      POSTGRES_PASSWORD: laundry
      POSTGRES_DB: laundry
    ports:
      - "5448:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6395:6379"

  api:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run start"
    environment:
      PORT: 8197
      HOST: 0.0.0.0
      LAUNDRY_DATABASE_URL: postgres://laundry:laundry@postgres:5432/laundry
      LAUNDRY_REDIS_URL: redis://redis:6379
      LAUNDRY_KAFKA_BROKERS: kafka:9092
    volumes:
      - ./backend:/app
    ports:
      - "8197:8197"
    depends_on:
      - kafka
      - postgres
      - redis

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    volumes:
      - ./frontend:/app
    ports:
      - "5197:5197"
    depends_on:
      - api
