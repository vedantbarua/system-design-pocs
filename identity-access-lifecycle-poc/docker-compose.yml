services:
  kafka:
    image: redpandadata/redpanda:v24.3.6
    command: [redpanda,start,--overprovisioned,--smp,"1",--memory,512M,--reserve-memory,0M,--node-id,"0",--check=false,--kafka-addr,PLAINTEXT://0.0.0.0:9092,--advertise-kafka-addr,PLAINTEXT://127.0.0.1:9100]
    ports: ["9100:9092","9652:9644"]
  postgres:
    image: postgres:17-alpine
    environment: {POSTGRES_DB: identity_lifecycle,POSTGRES_USER: identity,POSTGRES_PASSWORD: identity}
    ports: ["5443:5432"]
    volumes: [identity-postgres-data:/var/lib/postgresql/data]
  redis:
    image: redis:7-alpine
    ports: ["6390:6379"]
volumes:
  identity-postgres-data:
