services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: medication_poc
      POSTGRES_USER: medication
      POSTGRES_PASSWORD: medication
    ports:
      - "5433:5432"
    volumes:
      - medication-postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6380:6379"
    volumes:
      - medication-redis:/data

volumes:
  medication-postgres:
  medication-redis:
