services:
  kafka:
    image: redpandadata/redpanda:v24.3.6
    command: [redpanda, start, --overprovisioned, --smp, "1", --memory, 512M, --reserve-memory, 0M, --node-id, "0", --check=false, --kafka-addr, PLAINTEXT://0.0.0.0:9092, --advertise-kafka-addr, PLAINTEXT://127.0.0.1:9098]
    ports: ["9098:9092", "9650:9644"]
  postgres:
    image: postgres:17-alpine
    environment: { POSTGRES_DB: cashflow, POSTGRES_USER: cashflow, POSTGRES_PASSWORD: cashflow }
    ports: ["5441:5432"]
    volumes: [cashflow-postgres-data:/var/lib/postgresql/data]
  redis:
    image: redis:7-alpine
    ports: ["6388:6379"]
volumes:
  cashflow-postgres-data:
