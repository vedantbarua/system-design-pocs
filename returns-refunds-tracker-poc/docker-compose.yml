services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: returns_refunds
      POSTGRES_USER: returns
      POSTGRES_PASSWORD: returns
    ports:
      - "5432:5432"
    volumes:
      - returns-postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - returns-redis:/data

volumes:
  returns-postgres:
  returns-redis:
