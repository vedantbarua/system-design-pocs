services:
  kafka:
    image: redpandadata/redpanda:v24.3.6
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - 512M
      - --reserve-memory
      - 0M
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://127.0.0.1:9093
    ports:
      - "9093:9092"
      - "9645:9644"

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: automation_rules
      POSTGRES_USER: automation
      POSTGRES_PASSWORD: automation
    ports:
      - "5436:5432"
    volumes:
      - automation-postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6383:6379"

volumes:
  automation-postgres-data:
